<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #fafafa;
    }
    #viewer {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #error {
      color: red;
      text-align: center;
      display: none;
      padding: 20px;
      font-family: sans-serif;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="viewer"></div>
  <div id="error"></div>
  <script>
    var rendition = null;
    var startX = 0;
    var startY = 0;
    var SWIPE_THRESHOLD = 100;

    function applyTheme(options) {
      if (!rendition) return;
      rendition.themes.default({
        body: {
          color: options.textColor || '#000000',
          'font-size': (options.fontSize || 100) + '%',
          'background-color': options.backgroundColor || '#fafafa',
        }
      });
    }

    function handleMessage(event) {
      try {
        var data = event.data;
        if (!data || data === 'READY') return;

        // Settings update from React Native
        if (typeof data === 'string' && data.charAt(0) === '{') {
          var msg = JSON.parse(data);
          if (msg.type === 'THEME') { applyTheme(msg); return; }
        }

        // Book data — first load
        var book = ePub(data, { encoding: 'base64' });
        // force absulute dimensions render
        rendition = book.renderTo('viewer', { 
          width: window.innerWidth, 
          height: window.innerHeight, 
          spread: 'none',
          manager: 'continuous',
          flow: 'paginated'
        });
        rendition.display();

        rendition.on('touchstart', function(e) {
          startX = e.changedTouches[0].screenX;
          startY = e.changedTouches[0].screenY;
        });

        rendition.on('touchend', function(e) {
          var endX = e.changedTouches[0].screenX;
          var endY = e.changedTouches[0].screenY;
          var deltaX = endX - startX;
          var deltaY = endY - startY;

          // ignore vertical gestures
          if (Math.abs(deltaY) > Math.abs(deltaX)) return;

          if (Math.abs(deltaX) > SWIPE_THRESHOLD) {
            deltaX < 0 ? rendition.next() : rendition.prev();
          } else {
            var zone = endX / window.innerWidth;
            if (zone < 0.33) rendition.prev();
            else if (zone > 0.66) rendition.next();
          }
        });

      } catch (e) {
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').innerText = 'EPUB Engine Error: ' + e.message;
      }
    }

    window.addEventListener('message', handleMessage);
    document.addEventListener('message', handleMessage);

    window.onload = function() {
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage('READY');
      }
    };
  </script>
</body>
</html>
